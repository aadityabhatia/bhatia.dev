project:
  type: website
  render:
    - "*.qmd"
    - "talks/*.qmd"
  resources:
    - slides.css
    - images/
  preview:
    port: 7827
    browser: false
    navigate: false
    timeout: 3600

website:
  title: Sonny Bhatia
  description:  Army Officer | Researcher | Software Architect
  site-url: https://bhatia.dev
  repo-url: https://github.com/aadityabhatia/bhatia.dev
  image: https://gravatar.com/avatar/d3a9cc1b103d1d983c1cf41bad7b6587e5efd5a2525866b9fce14dcb5f949fcf?size=360
  open-graph: true
  page-footer: "© 2026 Aaditya Bhatia"
  favicon: favicon.svg

format:
  html:
    toc: true
    toc-expand: true
    code-fold: true
    smooth-scroll: true
    page-layout: full
    fig-align: center
    fontsize: 1.2em
    respect-user-color-scheme: true
    theme:
      light:
        - yeti
      dark:
        - cyborg
    mermaid:
      theme: neutral
    grid:
      body-width: 1800px
  revealjs:
    author: Sonny Bhatia
    center: true
    date-format: full
    width: 1600
    height: 900
    transition: slide
    background-transition: fade
    default-timing: 60
    preview-links: false
    link-external-newwindow: true
    link-external-icon: true
    code-block-height: 800px
    code-annotations: select
    tbl-cap-location: bottom
    slide-number: true
    pdf-separate-fragments: false
    theme: dark
    css: '/slides.css'
    mermaid-format: svg
    mermaid:
      theme: dark
